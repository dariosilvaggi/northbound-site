<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Booking Confirmed — NorthBound Weekends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080810;color:#f5f0e8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .icon{font-size:4rem;margin-bottom:1.5rem;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:0.08em;color:#C8974E;margin-bottom:0.5rem;}
  p{color:rgba(245,240,232,0.7);font-size:1rem;max-width:440px;line-height:1.6;margin-bottom:0.5rem;}
  .detail{font-size:0.85rem;color:rgba(245,240,232,0.4);margin-bottom:2rem;}
  .btn{display:inline-block;padding:0.85rem 2rem;background:linear-gradient(135deg,#C8974E,#a06b2a);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;letter-spacing:0.04em;font-size:0.9rem;}
  .btn:hover{opacity:0.9;}
</style>
</head>
<body>
  <div class="icon">🎉</div>
  <h1>You're In!</h1>
  <p>Your deposit was received and your spot is locked. Check your email for a confirmation.</p>
  <p class="detail">Balance is due 14 days before your trip date. We'll send a reminder.</p>
  <a href="/" class="btn">Back to NorthBound</a>
</body>
</html>
