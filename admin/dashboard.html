<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthBound — Sponsor Banners</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    color: #e8e0d0;
    min-height: 100vh;
  }

  /* ── Nav ── */
  .topbar {
    background: #111118;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
  .topbar-left img { height: 36px; width: auto; }
  .topbar-title {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, #C8974E, #e8c080);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .topbar-sub { font-size: 0.72rem; color: #555; letter-spacing: 0.1em; text-transform: uppercase; }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .btn-logout {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 0.4rem 0.9rem;
    color: #888;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    text-decoration: none;
  }
  .btn-logout:hover { border-color: rgba(200,151,78,0.4); color: #C8974E; }
  .visit-link {
    font-size: 0.8rem;
    color: #555;
    text-decoration: none;
    transition: color 0.2s;
  }
  .visit-link:hover { color: #C8974E; }

  /* ── Layout ── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
  }
  .page-title {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .page-sub { font-size: 0.84rem; color: #666; margin-bottom: 2.5rem; }

  /* ── Upload card ── */
  .upload-card {
    background: #111118;
    border: 1px solid rgba(200,151,78,0.2);
    border-radius: 14px;
    padding: 1.75rem;
    margin-bottom: 2.5rem;
  }
  .card-heading {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #C8974E;
    margin-bottom: 1.25rem;
  }
  .form-row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 200px; }
  label {
    display: block;
    font-size: 0.78rem;
    color: #888;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  input[type="text"], input[type="url"] {
    width: 100%;
    background: #0d0d14;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    color: #f0e8d8;
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, input[type="url"]:focus {
    border-color: rgba(200,151,78,0.5);
  }
  .file-label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: #0d0d14;
    border: 1px dashed rgba(200,151,78,0.3);
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    cursor: pointer;
    font-size: 0.88rem;
    color: #888;
    transition: border-color 0.2s, color 0.2s;
  }
  .file-label:hover { border-color: #C8974E; color: #C8974E; }
  .file-label.has-file { border-color: rgba(200,151,78,0.6); color: #C8974E; }
  input[type="file"] { display: none; }
  .btn-upload {
    background: linear-gradient(135deg, #C8974E, #b07030);
    border: none;
    border-radius: 8px;
    padding: 0.68rem 1.5rem;
    color: #0a0a0f;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: opacity 0.2s;
    height: 42px;
  }
  .btn-upload:hover { opacity: 0.88; }
  .upload-hint {
    font-size: 0.76rem;
    color: #444;
    margin-top: 0.75rem;
  }

  /* ── Banner list ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title { font-size: 1rem; font-weight: 600; color: #ccc; }
  .badge {
    font-size: 0.72rem;
    background: rgba(200,151,78,0.15);
    color: #C8974E;
    border: 1px solid rgba(200,151,78,0.2);
    border-radius: 20px;
    padding: 0.2rem 0.65rem;
    font-weight: 600;
  }
  .banner-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .banner-card {
    background: #111118;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .banner-card:hover { border-color: rgba(200,151,78,0.2); }
  .banner-card.inactive { opacity: 0.45; }
  .banner-img-wrap {
    position: relative;
    height: 140px;
    background: #0d0d14;
    overflow: hidden;
  }
  .banner-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .banner-status {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
  }
  .banner-status.active {
    background: rgba(50,200,100,0.2);
    color: #50d080;
    border: 1px solid rgba(50,200,100,0.3);
  }
  .banner-status.inactive {
    background: rgba(150,150,150,0.15);
    color: #888;
    border: 1px solid rgba(150,150,150,0.2);
  }
  .banner-body { padding: 0.85rem 1rem; }
  .banner-url {
    font-size: 0.78rem;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.75rem;
    min-height: 1.1em;
  }
  .banner-url a { color: #C8974E; text-decoration: none; }
  .banner-actions { display: flex; gap: 0.5rem; }
  .btn-toggle {
    flex: 1;
    padding: 0.45rem 0.5rem;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: #aaa;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-toggle:hover { border-color: rgba(200,151,78,0.4); color: #C8974E; }
  .btn-toggle.active { border-color: rgba(50,200,100,0.3); color: #50d080; background: rgba(50,200,100,0.05); }
  .btn-delete {
    padding: 0.45rem 0.6rem;
    border-radius: 6px;
    border: 1px solid rgba(182,30,26,0.2);
    background: transparent;
    color: #c06060;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-delete:hover { background: rgba(182,30,26,0.1); border-color: rgba(182,30,26,0.4); }
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #444;
    font-size: 0.9rem;
    border: 1px dashed rgba(255,255,255,0.06);
    border-radius: 12px;
  }
  .empty-state svg { margin-bottom: 0.75rem; opacity: 0.3; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="/logo.png" alt="NorthBound">
    <div>
      <div class="topbar-title">NORTHBOUND</div>
      <div class="topbar-sub">Admin</div>
    </div>
  </div>
  <div class="topbar-right">
    <a href="/" class="visit-link" target="_blank">View site ↗</a>
    <a href="/admin/logout" class="btn-logout">Sign out</a>
  </div>
</div>

<div class="container">
  <div class="page-title">Sponsor Banners</div>
  <p class="page-sub">Upload and manage sponsor banners displayed on the site. Banners rotate automatically in the sidebar.</p>

  <!-- Upload form -->
  <div class="upload-card">
    <div class="card-heading">Upload New Banner</div>
    <form method="POST" action="/admin/upload" enctype="multipart/form-data" id="uploadForm">
      <div class="form-row">
        <div class="form-group">
          <label>Banner Image</label>
          <label class="file-label" id="fileLabel" for="bannerFile">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            <span id="fileLabelText">Choose image file…</span>
          </label>
          <input type="file" id="bannerFile" name="banner" accept="image/*" required>
        </div>
        <div class="form-group">
          <label>Click-through URL (optional)</label>
          <input type="url" name="url" placeholder="https://sponsor.com">
        </div>
        <div>
          <label style="opacity:0">Upload</label>
          <button type="submit" class="btn-upload">Upload Banner</button>
        </div>
      </div>
      <p class="upload-hint">Max 5MB · JPG, PNG, GIF, WebP accepted · Recommended size: 300×600px</p>
    </form>
  </div>

  <!-- Banner list -->
  <div class="section-header">
    <span class="section-title">All Banners</span>
    <span class="badge" id="activeBadge">0 active</span>
  </div>

  <div class="banner-grid" id="bannerGrid">
    <div class="empty-state">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
      </svg>
      <div>No banners uploaded yet</div>
    </div>
  </div>
</div>

<script>
// File label update
document.getElementById('bannerFile').addEventListener('change', function() {
  const label = document.getElementById('fileLabel');
  const text = document.getElementById('fileLabelText');
  if (this.files[0]) {
    text.textContent = this.files[0].name;
    label.classList.add('has-file');
  } else {
    text.textContent = 'Choose image file…';
    label.classList.remove('has-file');
  }
});

// Load banners
async function loadBanners() {
  const res = await fetch('/admin/api/banners');
  const banners = await res.json();
  renderBanners(banners);
}

function renderBanners(banners) {
  const grid = document.getElementById('bannerGrid');
  const active = banners.filter(b => b.active).length;
  document.getElementById('activeBadge').textContent = `${active} active`;

  if (!banners.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
      </svg>
      <div>No banners uploaded yet</div>
    </div>`;
    return;
  }

  grid.innerHTML = banners.map(b => `
    <div class="banner-card ${b.active ? '' : 'inactive'}" id="card-${b.id}">
      <div class="banner-img-wrap">
        <img src="/banners/${b.filename}" alt="Sponsor banner">
        <span class="banner-status ${b.active ? 'active' : 'inactive'}">${b.active ? 'Active' : 'Paused'}</span>
      </div>
      <div class="banner-body">
        <div class="banner-url">${b.url ? `<a href="${b.url}" target="_blank">${b.url}</a>` : '<span style="color:#333">No URL set</span>'}</div>
        <div class="banner-actions">
          <button class="btn-toggle ${b.active ? 'active' : ''}" onclick="toggleBanner('${b.id}', this)">
            ${b.active ? '⏸ Pause' : '▶ Activate'}
          </button>
          <button class="btn-delete" onclick="deleteBanner('${b.id}')">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function toggleBanner(id, btn) {
  const res = await fetch(`/admin/toggle/${id}`, { method: 'POST' });
  const data = await res.json();
  if (data.success) loadBanners();
}

async function deleteBanner(id) {
  if (!confirm('Delete this banner? This cannot be undone.')) return;
  await fetch(`/admin/delete/${id}`, { method: 'POST' });
  loadBanners();
}

loadBanners();
</script>
</body>
</html>
